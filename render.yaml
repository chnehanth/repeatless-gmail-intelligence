# Render Blueprint — single web service that builds + serves the whole app.
# Deploy: Render Dashboard → New → Blueprint → connect this repo.
# Secrets (sync:false) are entered in the Render dashboard, never committed.
services:
  - type: web
    name: repeatless
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      # ---- non-secret defaults ----
      - key: NODE_ENV
        value: production
      - key: LOG_PRETTY
        value: "false"
      - key: GEMINI_CHAT_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: EMBEDDING_DIMENSIONS
        value: "768"
      - key: EMBEDDING_PROVIDER
        value: gemini
      - key: METRICS_ENABLED
        value: "true"
      # ---- set to the service's own URL after first deploy (single origin) ----
      - key: API_BASE_URL
        sync: false
      - key: WEB_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        sync: false
      # ---- secrets: paste in the Render dashboard ----
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: NIM_API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
